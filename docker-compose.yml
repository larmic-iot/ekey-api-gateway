services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      EKEY_EMAIL: ${EKEY_EMAIL}
      EKEY_PASSWORD: ${EKEY_PASSWORD}
      EKEY_CLIENT_KEY_FILE: /data/ekey-client.json
    volumes:
      - gateway-data:/data
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    ports:
      - "8084:8080"
    environment:
      URLS: >-
        [
          { "url": "http://localhost:8080/openapi", "name": "ekey API Gateway" }
        ]
    restart: unless-stopped

volumes:
  gateway-data:
