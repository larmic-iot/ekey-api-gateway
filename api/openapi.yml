openapi: 3.0.3
info:
  title: ekey API Gateway
  description: |
    API-Gateway für das ekey bionyx Smart-Lock-System.
    Authentifizierung erfolgt automatisch beim Start über die Umgebungsvariablen
    EKEY_EMAIL und EKEY_PASSWORD (Azure AD B2C mit PKCE).
    Token-Refresh wird automatisch im Hintergrund durchgeführt.
  version: 1.0.0
  license:
    name: Apache 2.0

servers:
  - url: http://localhost:8080
    description: Lokale Entwicklung (Docker Compose)

tags:
  - name: Health
    description: Health-Check-Endpunkte
  - name: Info
    description: Benutzer-, System- und Geräteinformationen
  - name: Proxy
    description: Transparenter Proxy zur ekey bionyx API

paths:
  /openapi:
    get:
      summary: OpenAPI-Spezifikation
      tags: [Health]
      responses:
        "200":
          description: OpenAPI 3.0.3 YAML-Dokument

  /health:
    get:
      summary: Allgemeiner Health-Status
      tags: [Health]
      responses:
        "200":
          description: Service läuft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/live:
    get:
      summary: Liveness-Probe
      tags: [Health]
      responses:
        "200":
          description: Service ist erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/ready:
    get:
      summary: Readiness-Probe
      tags: [Health]
      description: Gibt UP zurück wenn authentifiziert, sonst DOWN.
      responses:
        "200":
          description: Authentifiziert und bereit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /info:
    get:
      summary: Benutzer-, Auth- und System-/Geräteinformationen
      tags: [Info]
      description: |
        Gibt gecachte Benutzerprofile, Authentifizierungsstatus und
        alle Systeme mit zugehörigen Geräten zurück.
      responses:
        "200":
          description: Informationen geladen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"
        "503":
          description: Nicht authentifiziert oder Informationen noch nicht geladen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /proxy/{path}:
    get:
      summary: GET-Anfrage an ekey bionyx API weiterleiten
      tags: [Proxy]
      description: |
        Entfernt das /proxy-Präfix und leitet die Anfrage an
        https://bionyx-prod.azurefd.net weiter. Fügt automatisch
        den Bearer-Token und api-version=6.5 hinzu.
      parameters:
        - $ref: "#/components/parameters/ProxyPath"
      responses:
        "200":
          description: Antwort vom Upstream
        "503":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: POST-Anfrage an ekey bionyx API weiterleiten
      tags: [Proxy]
      parameters:
        - $ref: "#/components/parameters/ProxyPath"
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Antwort vom Upstream
        "503":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: PUT-Anfrage an ekey bionyx API weiterleiten
      tags: [Proxy]
      parameters:
        - $ref: "#/components/parameters/ProxyPath"
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Antwort vom Upstream
        "503":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: DELETE-Anfrage an ekey bionyx API weiterleiten
      tags: [Proxy]
      parameters:
        - $ref: "#/components/parameters/ProxyPath"
      responses:
        "200":
          description: Antwort vom Upstream
        "503":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    ProxyPath:
      name: path
      in: path
      required: true
      description: API-Pfad (z.B. api/User/UserAndSystems)
      schema:
        type: string
      example: api/User/UserAndSystems

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [UP]
      example:
        status: UP

    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum: [UP, DOWN]
        auth:
          type: string
          enum: [not_authenticated, authenticated, token_expired]
      example:
        status: UP
        auth: authenticated

    InfoResponse:
      type: object
      properties:
        auth:
          type: object
          properties:
            status:
              type: string
              enum: [not_authenticated, authenticated, token_expired]
            expiresIn:
              type: integer
              description: Sekunden bis Token abläuft
        user:
          $ref: "#/components/schemas/User"
        systems:
          type: array
          items:
            $ref: "#/components/schemas/System"

    User:
      type: object
      properties:
        userId:
          type: string
        displayName:
          type: string
        email:
          type: string

    System:
      type: object
      properties:
        systemId:
          type: string
        created:
          type: string
        onboarded:
          type: boolean
        devices:
          type: array
          items:
            $ref: "#/components/schemas/Device"

    Device:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      example:
        error: not authenticated
